server {
    listen 3000;
    server_name _;
    root /opt/ai-workbench/web/dist;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /assets { try_files /index.html =404; }
    location = /query { try_files /index.html =404; }
    location = /dashboards { try_files /index.html =404; }
    location = /alerts { try_files /index.html =404; }
    location = /notifications { try_files /index.html =404; }
    location = /aiops { try_files /index.html =404; }
    location = /org { try_files /index.html =404; }
    location = /platform { try_files /index.html =404; }
    location = /integrations { try_files /index.html =404; }
    location = /settings { try_files /index.html =404; }
    location = /workbench { try_files /index.html =404; }
    location = /knowledge { try_files /index.html =404; }
    location = /workflows { try_files /index.html =404; }
    location = /topology { try_files /index.html =404; }
    location = /diagnose { try_files /index.html =404; }
    location = /catpaw { try_files /index.html =404; }
    location = /login { try_files /index.html =404; }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /download {
        proxy_pass http://127.0.0.1:8080;
    }

    location /metrics {
        proxy_pass http://127.0.0.1:8080;
    }
}
